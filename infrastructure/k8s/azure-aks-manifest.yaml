apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-ai-backend
  labels:
    app: voice-ai-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voice-ai-backend
  template:
    metadata:
      labels:
        app: voice-ai-backend
    spec:
      containers:
      - name: backend
        image: auroraaudioacrprod.azurecr.io/enterprise-voice-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: voice-ai-secrets
              key: database-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: voice-ai-secrets
              key: openai-key
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: voice-ai-backend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: voice-ai-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-ai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voice-ai-frontend
  template:
    metadata:
      labels:
        app: voice-ai-frontend
    spec:
      containers:
      - name: frontend
        image: auroraaudioacrprod.azurecr.io/enterprise-voice-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: voice-ai-frontend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: voice-ai-frontend
